version: "3"

services:
  app:
    image: nginx:alpine
    ports:
      - "3000:80"
    depends_on:
      - db
      - cache

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    image: python:3.11-slim
    depends_on:
      - db
      - cache

