<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Config Visualizer</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            background: #f7f9fc;
            color: #1f2937;
        }

        .fallback {
            max-width: 560px;
            padding: 20px;
            border: 1px solid #dbe3ed;
            border-radius: 8px;
            background: #ffffff;
        }

        code {
            background: #eef2f7;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="fallback">
    <h1>Universal Config Visualizer</h1>
    <p>This fallback page is served when frontend build assets are not present.</p>
    <p>Build the TypeScript frontend in <code>frontend/</code> and copy <code>frontend/dist</code> into Spring static resources for production packaging.</p>
</div>
</body>
</html>
