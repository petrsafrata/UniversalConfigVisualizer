name: Publish Docker Image

on:
  workflow_run:
    workflows: ["BA+FA CI + Auto Release"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Build and Push Image to GHCR
    runs-on: ubuntu-latest
    if: >-
      ${ {
        github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
      } }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image name
        id: image
        shell: bash
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${OWNER_LOWER}/configviz" >> "$GITHUB_OUTPUT"

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d ' \n\r\t')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.event_name == 'workflow_run' }}
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
